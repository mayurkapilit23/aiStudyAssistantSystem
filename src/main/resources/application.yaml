spring:
  application:
    name: aiStudyAssistantSystem
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdb
    username: mayur
    password: mayur
    driver-class-name: org.postgresql.Driver
#    url: ${DB_URL}
#    username: ${DB_USER}
#    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # set limits to documents while uploading
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

